name: Add Contributor to README

on:
  pull_request_target:
    types:
      - closed

# Prevent concurrent runs to avoid README write conflicts
concurrency:
  group: add-contributor
  cancel-in-progress: false

jobs:
  add-contributor:
    # Only run when the PR was actually merged
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Add Contributor to README
        env:
          USERNAME: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          # ── Validate username ────────────────────────────────────────────────
          if [[ ! "$USERNAME" =~ ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,37}[a-zA-Z0-9])?$ ]]; then
            echo "ERROR: Invalid or potentially malicious username: '$USERNAME'."
            exit 1
          fi

          # ── Build URLs & HTML snippet ────────────────────────────────────────
          PROFILE_URL="https://github.com/${USERNAME}"
          AVATAR_URL="https://github.com/${USERNAME}.png"

          LINK_MD="<a href=\"${PROFILE_URL}\"><img src=\"${AVATAR_URL}\" width=\"50px\" alt=\"${USERNAME}\" /></a>"

          # ── Prevent duplicates ───────────────────────────────────────────────
          if grep -qF "href=\"${PROFILE_URL}\"" README.md; then
            echo "ℹ️ Contributor already exists in README.md"
            exit 0
          fi

          # ── Escape sed replacement chars safely ─────────────────────────────
          ESCAPED_LINK=$(printf '%s\n' "$LINK_MD" | sed 's/[\/&]/\\&/g')

          # ── Insert before CONTRIBUTORS_END marker ───────────────────────────
          sed -i "/<!-- CONTRIBUTORS_END -->/i\\${ESCAPED_LINK}" README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          commit-message: "docs: add ${{ env.USERNAME }} to contributors"
          title: "docs: add ${{ env.USERNAME }} to contributors"
          body: "Automated contributor update."
          branch: contributor-${{ env.USERNAME }}
          delete-branch: true
          add-paths: |
            README.md