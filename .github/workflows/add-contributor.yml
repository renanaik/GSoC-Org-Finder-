name: Add Contributor to README

on:
  pull_request_target:
    types:
      - closed

concurrency:
  group: add-contributor-readme
  cancel-in-progress: false
  
jobs:
  add-contributor:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Add Contributor
        # Pass ALL user-controlled values via env: to prevent script injection
        env:
          USERNAME: ${{ github.event.pull_request.user.login }}
        run: |
          # Strictly validate: GitHub usernames are alphanumeric + hyphens, 1-39 chars
          if [[ ! "$USERNAME" =~ ^[a-zA-Z0-9-]{1,39}$ ]]; then
            echo "ERROR: Invalid username format: '$USERNAME'. Aborting."
            exit 1
          fi

          PROFILE_URL="https://github.com/${USERNAME}"
          AVATAR_URL="https://github.com/${USERNAME}.png"

          # Build the HTML contributor entry
          LINK_MD="<a href=\"${PROFILE_URL}\"><img src=\"${AVATAR_URL}\" width=\"50px\" alt=\"${USERNAME}\" /></a>"

          # Use fgrep (fixed-string, no regex interpretation) to check for existing entry
          if ! grep -qF "href=\"${PROFILE_URL}\"" README.md; then
            # Escape the string for use as a sed replacement (handles /, \, &, newlines)
            ESCAPED_LINK=$(printf '%s\n' "$LINK_MD" | sed 's/[\/&]/\\&/g')

            sed -i "/<!-- CONTRIBUTORS_END -->/i ${ESCAPED_LINK}" README.md

            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            git add README.md
            # Use -- to separate commit message flags from the message itself
            git commit -m "docs: add ${USERNAME} to contributors in README"
            git push
          else
            echo "Contributor ${USERNAME} is already in the README."
          fi
