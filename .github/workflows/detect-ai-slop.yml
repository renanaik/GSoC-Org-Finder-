name: 🛡️ Anti Slop Protection

on:
pull_request_target:
types:
- opened
- reopened
- edited
- synchronize

permissions:
contents: read
issues: write
pull-requests: write

jobs:
anti-slop:
runs-on: ubuntu-latest

steps:
  - name: Run Anti Slop
    uses: peakoss/anti-slop@v0.3.2

    with:
      max-failures: 5

      # ─────────────────────────────────────
      # PR Quality
      # ─────────────────────────────────────
      require-description: true
      require-linked-issue: true
      require-conventional-title: true
      require-pr-template: true

      # ─────────────────────────────────────
      # Prevent spam PRs
      # ─────────────────────────────────────
      max-emoji-count: 3
      max-description-length: 3000
      max-code-references: 8

      # ─────────────────────────────────────
      # Prevent branch abuse
      # ─────────────────────────────────────
      blocked-source-branches: |
        main
        master

      # ─────────────────────────────────────
      # Commit quality
      # ─────────────────────────────────────
      require-conventional-commits: false
      max-commit-message-length: 200

      # ─────────────────────────────────────
      # User validation
      # ─────────────────────────────────────
      detect-spam-usernames: true
      min-account-age: 15
      require-public-profile: false
      min-global-merge-ratio: 10

      # ─────────────────────────────────────
      # Repository philosophy protection
      # ─────────────────────────────────────
      blocked-paths: |
        package-lock.json
        yarn.lock
        pnpm-lock.yaml
        bun.lockb
        node_modules/
        dist/
        build/

      # ─────────────────────────────────────
      # AI honeypot traps
      # ─────────────────────────────────────
      blocked-terms: |
        generated by chatgpt
        generated with ai
        fully generated
        autogenerated
        ai generated
        prompt used
        as an ai language model

      # ─────────────────────────────────────
      # PR template strict sections
      # ─────────────────────────────────────
      strict-pr-template-sections: |
        checklist

      optional-pr-template-sections: |
        screenshots

      # ─────────────────────────────────────
      # Exemptions
      # ─────────────────────────────────────
      exempt-author-association: |
        OWNER,
        MEMBER,
        COLLABORATOR

      exempt-users: |
        S3DFX-CYBER

      # ─────────────────────────────────────
      # Failure behavior
      # ─────────────────────────────────────
      failure-add-pr-labels: |
        invalid,
        ai-slop

      success-add-pr-labels: |
        validated

      failure-pr-message: |
        ## 🚫 PR Automatically Flagged

        This pull request triggered multiple repository quality checks.

        Possible reasons include:
        - missing linked issue
        - low-quality PR structure
        - missing PR template
        - AI-slop indicators
        - spam-like contribution patterns
        - repository rule violations

        Please carefully review:
        - CONTRIBUTING.md
        - PR template requirements
        - repository contribution standards

        If you believe this was flagged incorrectly,
        a maintainer may manually review it.

      close-pr: false
      lock-pr: false