name: 🛡️ Detect AI Slop PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: anti-slop-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  anti-slop:
    runs-on: ubuntu-latest

    steps:
      - name: Run Anti Slop
        uses: peakoss/anti-slop@v0

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # ─────────────────────────────────────────────
          # Sensitivity
          # ─────────────────────────────────────────────
          max-failures: 5

          # ─────────────────────────────────────────────
          # PR Requirements
          # ─────────────────────────────────────────────
          require-description: true
          require-linked-issue: true
          require-pr-template: true
          require-maintainer-can-modify: true

          # ─────────────────────────────────────────────
          # Conventional Commits
          # ─────────────────────────────────────────────
          require-conventional-title: true
          require-conventional-commits: false

          # ─────────────────────────────────────────────
          # Size Limits
          # ─────────────────────────────────────────────
          max-changed-files: 40
          max-changed-lines: 5000
          max-description-length: 2500
          max-commit-message-length: 300

          # ─────────────────────────────────────────────
          # AI / Spam Detection
          # ─────────────────────────────────────────────
          max-emoji-count: 4
          max-code-references: 10
          detect-spam-usernames: true
          require-public-profile: false
          min-account-age: 7
          max-daily-forks: 10

          # ─────────────────────────────────────────────
          # Safer AI Slop Detection
          # Avoid false positives for valid AI/LLM PRs
          # ─────────────────────────────────────────────
          blocked-terms: |
            generated by chatgpt
            generated with chatgpt
            this pr was automatically generated
            fully generated by ai
            auto generated pull request
            prompt used:
            here is the prompt
            as an ai language model
            i cannot access external systems
            chatgpt said
            created entirely using ai
            no manual changes were made
            generated automatically from prompt

          # ─────────────────────────────────────────────
          # PR Template Enforcement
          # ─────────────────────────────────────────────
          strict-pr-template-sections: |
            checklist

          # ─────────────────────────────────────────────
          # Prevent Dangerous Source Branches
          # ─────────────────────────────────────────────
          blocked-source-branches: |
            main
            master

          # ─────────────────────────────────────────────
          # Exemptions
          # ─────────────────────────────────────────────
          exempt-author-association: |
            OWNER,MEMBER,COLLABORATOR

          exempt-bots: |
            github-actions[bot]
            dependabot[bot]

          # ─────────────────────────────────────────────
          # Failure Actions
          # ─────────────────────────────────────────────
          failure-add-pr-labels: |
            ai-slop
            low-quality-pr

          failure-pr-message: |
            ## 🚫 PR Automatically Flagged

            This pull request was automatically flagged by the repository quality system.

            Possible reasons:
            - Missing linked issue
            - Missing PR template
            - AI/slop indicators detected
            - Spam-like contribution patterns
            - Low-quality or incomplete PR structure

            Please:
            - Follow the PR template properly
            - Link the related issue
            - Keep PRs meaningful and focused
            - Avoid low-effort or autogenerated submissions

            If you believe this was a false positive, maintainers may reopen the PR after review.

          close-pr: true
          lock-pr: false
