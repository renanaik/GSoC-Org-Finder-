name: 🛡️ Detect AI Slop PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: anti-slop-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - name: Run Anti Slop Detection
        uses: peakoss/anti-slop@v0.2.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          max-failures: 5

          require-description: true
          require-linked-issue: true
          require-pr-template: true
          require-maintainer-can-modify: true

          require-conventional-title: true
          require-conventional-commits: false

          max-description-length: 2200

          max-emoji-count: 5
          detect-spam-usernames: true
          min-account-age: 5

          blocked-terms: |
            generated by chatgpt
            generated with chatgpt
            fully generated by ai
            auto generated pull request
            this pr was automatically generated
            created entirely using ai
            no manual changes were made
            prompt used
            as an ai language model
            chatgpt said
            claude generated
            gemini wrote
            grok generated
            i cannot access external systems

          strict-pr-template-sections: |
            checklist
            description

          blocked-source-branches: |
            main
            master

          exempt-author-association: "OWNER,MEMBER,COLLABORATOR"

          exempt-bots: |
            github-actions[bot]
            dependabot[bot]

          failure-add-pr-labels: |
            ai-slop
            low-quality-pr
          failure-pr-message: |
            ## 🚫 PR Flagged by Quality Guard

            This PR has been flagged by automated quality checks.

            **Common reasons:**
            - Missing linked issue (`Closes #xxx`)
            - Not using the proper GSSOC/NSOC PR template
            - AI-generated or low-effort content
            - Too many changes in one PR

            Please fix the issues mentioned and push new commits.

          close-pr: true
          lock-pr: false
