name: 🧭 Smart Issue Assignment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: smart-issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  handle-assignment:
    if: github.event.issue.pull_request == null

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Smart assignment validation
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const sender = context.payload.sender;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            const username = sender.login;

            // ─────────────────────────────────────────────
            // Ignore bots
            // ─────────────────────────────────────────────
            if (sender.type === 'Bot') {
              core.info('Ignoring bot.');
              return;
            }

            const commentBody = (comment.body || '').toLowerCase();

            // ─────────────────────────────────────────────
            // Assignment commands
            // ─────────────────────────────────────────────
            const wantsAssign =
              commentBody.includes('/assign') ||
              commentBody.includes('assign me');

            const wantsUnassign =
              commentBody.includes('/unassign') ||
              commentBody.includes('unassign me');

            if (!wantsAssign && !wantsUnassign) {
              core.info('No assignment command detected.');
              return;
            }

            // ─────────────────────────────────────────────
            // Handle unassign
            // ─────────────────────────────────────────────
            if (wantsUnassign) {

              const assignedUsers =
                (issue.assignees || []).map(a => a.login);

              if (!assignedUsers.includes(username)) {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body:
                    `⚠️ @${username} is not assigned to this issue.`
                });

                return;
              }

              await github.rest.issues.removeAssignees({
                owner,
                repo,
                issue_number,
                assignees: [username]
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `✅ Unassigned @${username} from this issue.`
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Require contributor program
            // ─────────────────────────────────────────────
            const hasNsoc = commentBody.includes('nsoc');
            const hasGssoc = commentBody.includes('gssoc');

            if (!hasNsoc && !hasGssoc) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ Please specify your contribution program.\n\n` +
                  `Valid examples:\n` +
                  `- \`/assign nsoc\`\n` +
                  `- \`/assign gssoc\``
              });

              return;
            }

            // Prevent dual tagging
            if (hasNsoc && hasGssoc) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ Please specify only one contribution program:\n\n` +
                  `- nsoc\n` +
                  `- gssoc`
              });

              return;
            }

            let contributorLabel =
              hasNsoc ? 'nsoc26' : 'gssoc26';

            // ─────────────────────────────────────────────
            // Validate issue quality
            // ─────────────────────────────────────────────
            const title = issue.title || '';
            const body = issue.body || '';

            if (title.trim().length < 8) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ Issue title is too short.\n\n` +
                  `Please provide a meaningful title.`
              });

              return;
            }

            if (body.trim().length < 30) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ Issue description is too short.\n\n` +
                  `Please explain the issue properly before assignment.`
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Prevent multiple assignees
            // ─────────────────────────────────────────────
            const existingAssignees =
              (issue.assignees || []).map(a => a.login);

            if (existingAssignees.length > 0) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `⚠️ This issue is already assigned to:\n` +
                  `${existingAssignees.join(', ')}`
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Limit contributor to max 3 assignments
            // ─────────────────────────────────────────────
            const assignedIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: 'open',
                assignee: username,
                per_page: 100
              }
            );

            const activeAssignments =
              assignedIssues.filter(i => !i.pull_request);

            if (activeAssignments.length >= 3) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ @${username} already has ` +
                  `${activeAssignments.length} active assigned issues.\n\n` +
                  `Maximum allowed active assignments: 3.\n\n` +
                  `Please complete existing work before requesting more issues.`
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Use maintainer-defined difficulty labels only
            // ─────────────────────────────────────────────
            const currentLabels =
              (issue.labels || []).map(l => l.name);

            const level =
              currentLabels.find(l =>
                ['level-1', 'level-2', 'level-3'].includes(l)
              ) || 'level-1';

            // ─────────────────────────────────────────────
            // Fetch merged PR history
            // ─────────────────────────────────────────────
            const prs = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'closed',
                per_page: 100
              }
            );

            const mergedByUser = prs.filter(pr =>
              pr.user &&
              pr.user.login === username &&
              pr.merged_at
            );

            const mergedCount = mergedByUser.length;

            // ─────────────────────────────────────────────
            // Restrict level-3 issues
            // ─────────────────────────────────────────────
            if (level === 'level-3' && mergedCount < 1) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ Level 3 issues require at least 1 merged PR.\n\n` +
                  `You currently have ${mergedCount} merged PR(s).`
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Apply contributor labels
            // ─────────────────────────────────────────────
            const labelsToApply = [
              contributorLabel,
              'assigned'
            ];

            const missingLabels = labelsToApply.filter(
              l => !currentLabels.includes(l)
            );

            if (missingLabels.length > 0) {

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: missingLabels
              });
            }

            // ─────────────────────────────────────────────
            // Assign contributor
            // ─────────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [username]
            });

            // ─────────────────────────────────────────────
            // Success response
            // ─────────────────────────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body:
                `✅ Assigned @${username}\n\n` +

                `📌 Program: \`${contributorLabel}\`\n` +
                `📌 Contribution Level: \`${level}\`\n\n` +

                `💡 Contribution Tip\n\n` +

                `Please avoid opening many tiny PRs for related changes.\n\n` +

                `If multiple fixes are closely related:\n` +
                `- combine them into 1–2 well-structured PRs\n` +
                `- avoid micro-PR spam\n` +
                `- keep commits meaningful and focused\n\n` +

                `Happy contributing 🚀`
            });