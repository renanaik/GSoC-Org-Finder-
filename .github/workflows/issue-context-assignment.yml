name: 🧭 Smart Issue Assignment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: smart-issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  handle-assignment:
    if: github.event.issue.pull_request == null

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Smart assignment validation
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const sender = context.payload.sender;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            const username = sender.login;

            // ─────────────────────────────────────────────
            // Ignore bots
            // ─────────────────────────────────────────────
            if (sender.type === 'Bot') {
              core.info('Ignoring bot user.');
              return;
            }

            // ─────────────────────────────────────────────
            // Validate assignment command
            // ─────────────────────────────────────────────
            const commentBody = (comment.body || '').toLowerCase();

            const wantsAssign =
              commentBody.includes('/assign') ||
              commentBody.includes('assign me');

            const wantsUnassign =
              commentBody.includes('/unassign') ||
              commentBody.includes('unassign me');

            if (!wantsAssign && !wantsUnassign) {
              core.info('No assignment command detected.');
              return;
            }

            // ─────────────────────────────────────────────
            // Handle unassignment
            // ─────────────────────────────────────────────
            if (wantsUnassign) {
              const assignedUsers = (issue.assignees || []).map(a => a.login);

              if (!assignedUsers.includes(username)) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: `⚠️ @${username} is not assigned to this issue.`
                });

                return;
              }

              await github.rest.issues.removeAssignees({
                owner,
                repo,
                issue_number,
                assignees: [username]
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `✅ Unassigned @${username} from this issue.`
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Load CONTRIBUTING.md
            // ─────────────────────────────────────────────
            const contributingPaths = [
              'CONTRIBUTING.md',
              'Contributing.md',
              '.github/CONTRIBUTING.md'
            ];

            let contributingContent = '';

            for (const p of contributingPaths) {
              if (fs.existsSync(p)) {
                contributingContent = fs.readFileSync(p, 'utf8');
                break;
              }
            }

            if (!contributingContent) {
              core.setFailed('Could not find CONTRIBUTING.md');
              return;
            }

            // ─────────────────────────────────────────────
            // Validate issue quality
            // ─────────────────────────────────────────────
            const title = issue.title || '';
            const body = issue.body || '';

            if (title.trim().length < 8) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ Issue title is too short.\n\nPlease provide a meaningful issue title before requesting assignment.'
              });

              return;
            }

            if (body.trim().length < 30) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ Issue description is too short.\n\nPlease explain the issue clearly before requesting assignment.'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Prevent multiple assignees
            // ─────────────────────────────────────────────
            const existingAssignees = (issue.assignees || []).map(a => a.login);

            if (existingAssignees.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `⚠️ This issue is already assigned to: ${existingAssignees.join(', ')}`
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Determine contribution level
            // ─────────────────────────────────────────────
            const text = `${title}\n${body}`.toLowerCase();

            let level = 'level-1';

            const advancedKeywords = [
              'architecture',
              'optimization',
              'security',
              'performance',
              'edge function',
              'refactor',
              'api',
              'caching',
              'core feature'
            ];

            const intermediateKeywords = [
              'feature',
              'logic',
              'analytics',
              'sorting',
              'filter',
              'enhancement',
              'improvement'
            ];

            const hasAdvanced = advancedKeywords.some(k => text.includes(k));
            const hasIntermediate = intermediateKeywords.some(k => text.includes(k));

            if (hasAdvanced) {
              level = 'level-3';
            } else if (hasIntermediate) {
              level = 'level-2';
            }

            // ─────────────────────────────────────────────
            // Fetch contributor merged PR history
            // ─────────────────────────────────────────────
            const prs = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'closed',
                per_page: 100
              }
            );

            const mergedByUser = prs.filter(pr =>
              pr.user &&
              pr.user.login === username &&
              pr.merged_at
            );

            const mergedCount = mergedByUser.length;

            // ─────────────────────────────────────────────
            // Enforce Level-3 restriction
            // ─────────────────────────────────────────────
            if (level === 'level-3' && mergedCount < 1) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ Level 3 issues require at least 1 merged PR in this repository.\n\n` +
                  `You currently have ${mergedCount} merged PR(s).`
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Correct issue labels
            // ─────────────────────────────────────────────
            const currentLabels = (issue.labels || []).map(l => l.name);

            const levelLabels = ['level-1', 'level-2', 'level-3'];

            const labelsToRemove = currentLabels.filter(l =>
              levelLabels.includes(l) && l !== level
            );

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: label
                });
              } catch (err) {
                core.warning(`Failed removing label ${label}: ${err.message}`);
              }
            }

            if (!currentLabels.includes(level)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [level]
              });
            }

            // ─────────────────────────────────────────────
            // Assign contributor
            // ─────────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [username]
            });

            // ─────────────────────────────────────────────
            // Success response
            // ─────────────────────────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body:
                `✅ Assigned @${username}\n\n` +
                `Detected contribution level: \`${level}\`\n\n` +
                `Please follow the repository contribution guidelines and keep the PR focused and minimal.`
            });