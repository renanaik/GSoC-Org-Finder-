name: 🔍 Validate PR

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;

            const body = (pr.body || '').toLowerCase();
            const title = pr.title || '';

            let warnings = [];

            // ─────────────────────────────────────────────
            // Check linked issue
            // ─────────────────────────────────────────────
            const hasIssue =
              /closes\s+#\d+/i.test(body) ||
              /fixes\s+#\d+/i.test(body) ||
              /resolves\s+#\d+/i.test(body);

            if (!hasIssue) {
              warnings.push(
                '⚠️ No linked issue found. Please link an issue using `Closes #issue_number`.'
              );
            }

            // ─────────────────────────────────────────────
            // Detect program
            // ─────────────────────────────────────────────
            const isGSSOC = body.includes('gssoc');
            const isNSOC = body.includes('nsoc');

            if (!isGSSOC && !isNSOC) {
              warnings.push(
                '⚠️ Contribution program not detected.'
              );
            }

            // ─────────────────────────────────────────────
            // Required template sections
            // ─────────────────────────────────────────────
            const requiredSections = [
              'description',
              'related issue',
              'type of change',
              'how to test',
              'checklist'
            ];

            for (const section of requiredSections) {
              if (!body.includes(section)) {
                warnings.push(
                  `⚠️ Missing PR template section: \`${section}\``
                );
              }
            }

            // ─────────────────────────────────────────────
            // Conventional commits validation
            // ─────────────────────────────────────────────
            const conventionalRegex =
              /^(feat|fix|docs|style|refactor|test|chore)(\\(.+\\))?: .+/i;

            if (!conventionalRegex.test(title)) {
              warnings.push(
                '⚠️ PR title does not follow Conventional Commits format.'
              );
            }

            // ─────────────────────────────────────────────
            // Post warning comment
            // ─────────────────────────────────────────────
            if (warnings.length > 0) {

              const message =
                `## ⚠️ PR Validation Warning\n\n` +
                `Hi @${pr.user.login}, thanks for contributing 🚀\n\n` +
                warnings.map(w => `- ${w}`).join('\n') +
                `\n\n---\n\n` +
                `Please update the PR accordingly.\n\n` +
                `This is currently a warning only and does not automatically close the PR.`;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: message
              });
            }
