name: 🔍 Validate PR

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR structure
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumber = pr.number;
            const body = pr.body || '';
            const title = pr.title || '';
            const username = pr.user.login;

            const lowerBody = body.toLowerCase();

            let warnings = [];

            // Ignore bots
            if (pr.user.type === 'Bot') {
              core.info('Ignoring bot PR');
              return;
            }

            // Linked issue check
            const issueRegex =
              /(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+/i;

            if (!issueRegex.test(body)) {
              warnings.push(
                '❌ Missing linked issue.\nAdd:\n`Closes #issue-number`'
              );
            }

            // Contribution program detection
            const mentionsNSOC = lowerBody.includes('nsoc');
            const mentionsGSSOC = lowerBody.includes('gssoc');

            if (!mentionsNSOC && !mentionsGSSOC) {
              warnings.push(
                '⚠️ Contribution program not detected.\nUse the correct PR template.'
              );
            }

            // Apply labels
            try {
              if (mentionsNSOC) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['nsoc26']
                });
              }

              if (mentionsGSSOC) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['gssoc26']
                });
              }
            } catch (err) {
              core.warning(err.message);
            }

            // Required sections
            const requiredSections = [
              'description',
              'related issue',
              'type of change',
              'checklist'
            ];

            for (const section of requiredSections) {
              if (!lowerBody.includes(section)) {
                warnings.push(
                  `⚠️ Missing section: \`${section}\``
                );
              }
            }

            // Conventional title
            const conventionalRegex =
              /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+/i;

            if (!conventionalRegex.test(title)) {
              warnings.push(
                '⚠️ PR title should follow Conventional Commits.\nExample:\n`feat: add search filters`'
              );
            }

            // Final comment
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });

            const existing = comments.data.find(
              c =>
                c.user.type === 'Bot' &&
                c.body.includes('PR Validation')
            );

            const bodyComment =
              warnings.length > 0
                ? `## ⚠️ PR Validation Warning

Hi @${username}, thanks for contributing 🚀

${warnings.map(w => `- ${w}`).join('\n')}

---

Please update the PR accordingly.`
                : `## ✅ PR Validation Passed

Thanks @${username}! Your PR follows the repository guidelines 🚀`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: bodyComment
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: bodyComment
              });
            }