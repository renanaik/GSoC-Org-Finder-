name: 🔕 Auto Detect Ping Spam

on:
  issue_comment:
    types:
      - created

permissions:
  issues: write
  pull-requests: write
  contents: read

concurrency:
  group: ping-spam-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  detect-ping-spam:
    runs-on: ubuntu-latest

    steps:
      - name: Detect spam pings
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const sender = context.payload.sender;

            const issue_number = issue.number;
            const username = sender.login;

            const body = (comment.body || '').toLowerCase();

            // ─────────────────────────────────────────────
            // Ignore bots
            // ─────────────────────────────────────────────
            if (sender.type === 'Bot') {
              core.info('Ignoring bot.');
              return;
            }

            // ─────────────────────────────────────────────
            // Ignore maintainers/collaborators
            // ─────────────────────────────────────────────
            const association =
              comment.author_association || '';

            const exemptRoles = [
              'OWNER',
              'MEMBER',
              'COLLABORATOR'
            ];

            if (exemptRoles.includes(association)) {
              core.info('Ignoring maintainer/collaborator.');
              return;
            }

            // ─────────────────────────────────────────────
            // Detect maintainer ping spam
            // ─────────────────────────────────────────────
            const spamPatterns = [
              '@s3dfx-cyber',
              'please assign',
              'assign fast',
              'assign me fast',
              'review pls',
              'merge pls',
              'please merge',
              'why no response',
              'why not assigned',
              'ping',
              'hello maintainer',
              'kindly review',
              'please review',
              'check this pr',
              'any updates',
              'waiting for response',
              'please respond',
              'pls respond',
              'urgent review'
            ];

            const matchedSpam =
              spamPatterns.some(pattern =>
                body.includes(pattern)
              );

            if (!matchedSpam) {
              core.info('No spam ping detected.');
              return;
            }

            // ─────────────────────────────────────────────
            // Fetch contributor comments
            // ─────────────────────────────────────────────
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100
              }
            );

            const userSpamComments = comments.filter(c => {
              if (c.user.login !== username) {
                return false;
              }

              const text = (c.body || '').toLowerCase();

              return spamPatterns.some(pattern =>
                text.includes(pattern)
              );
            });

            const spamCount = userSpamComments.length;

            core.info(`Spam ping count: ${spamCount}`);

            // ─────────────────────────────────────────────
            // Warning stage
            // ─────────────────────────────────────────────
            if (spamCount <= 2) {

              const warning =
                `## ⚠️ Maintainer Ping Warning\n\n` +
                `Hi @${username}, please avoid repeatedly pinging ` +
                `maintainers for assignment, review, or merge requests.\n\n` +

                `Maintainers review contributions in queue order whenever possible.\n\n` +

                `Excessive pinging or spam comments may result in:\n` +
                `- spam labeling\n` +
                `- assignment removal\n` +
                `- moderation escalation\n\n` +

                `Recommended waiting times:\n` +
                `- Assignments: 12–24 hours\n` +
                `- PR reviews: 24–72 hours`;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: warning
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Escalation stage
            // ─────────────────────────────────────────────
            const escalation =
              `## 🚨 Repeated Ping Spam Detected\n\n` +
              `@${username} has repeatedly spam-pinged maintainers ` +
              `despite previous warnings.\n\n` +

              `This behavior may lead to:\n` +
              `- issue/pr moderation\n` +
              `- spam labeling\n` +
              `- assignment restrictions\n` +
              `- escalation to program admins\n\n` +

              `Please wait patiently for review instead of repeatedly pinging maintainers.`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: escalation
            });

            // ─────────────────────────────────────────────
            // Add spam label
            // ─────────────────────────────────────────────
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['spam']
              });
            } catch (err) {
              core.warning(`Failed adding spam label: ${err.message}`);
            }