name: рЯСЛ Issue Welcome Bot

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome contributor
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const username = issue.user.login;

            if (issue.user.type === 'Bot') return;

            const body = [
              `## рЯСЛ Thanks for opening an issue, @${username}!`,
              ``,
              `Our maintainers will review this issue shortly рЯЪА`,
              ``,
              `---`,
              ``,
              `## рЯУШ Before Contributing`,
              ``,
              `Please read the contribution guide carefully before requesting assignment:`,
              ``,
              `рЯСЙ https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md`,
              ``,
              `---`,
              ``,
              `## рЯПЈпЄП NSoC'26 / GSSoC'26 Requirement`,
              ``,
              `Please clearly mention whether you are contributing via:`,
              `- \`NSoC'26\``,
              `- \`GSSoC'26\``,
              `- or as a regular contributor`,
              ``,
              `Example: \`I am contributing under GSSoC'26\``,
              ``,
              `вЪ†пЄП Assignment requests without this information may be rejected automatically.`,
              ``,
              `---`,
              ``,
              `## вП≥ GSSoC Assignment Restriction`,
              ``,
              `GSSoC contributors will only be allowed to take issue assignments after:`,
              `### рЯЧУпЄП May 15th, 12:00 AM IST`,
              ``,
              `Before that date, assignment requests from GSSoC contributors will be automatically blocked.`,
              ``,
              `---`,
              ``,
              `## рЯ§Ц Assignment System`,
              ``,
              `To request assignment, comment: \`/assign\` or \`assign me\``,
              ``,
              `The smart assignment workflow validates:`,
              `- contributor eligibility`,
              `- NSoC/GSSoC participation mention`,
              `- active issue assignment limits`,
              `- repository contribution rules`,
              ``,
              `---`,
              ``,
              `## вЪ†пЄП Important Repository Rules`,
              ``,
              `- Do not start working before assignment`,
              `- Maximum 3 active assigned issues per contributor`,
              `- Contributors are encouraged to combine related fixes into 1вАУ2 quality PRs instead of many small PRs`,
              `- PRs without assignment may be closed`,
              `- Spam or low-quality PRs may be rejected`,
              `- Follow the zero-build, zero-dependency philosophy`,
              ``,
              `Happy contributing рЯОЙ`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });
