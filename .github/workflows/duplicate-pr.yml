name: 🔁 Duplicate PR Guard

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: duplicate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-duplicate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Detect duplicate PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;
            const title = (pr.title || '').trim();
            const username = pr.user.login;

            // Ignore bots
            if (pr.user.type === 'Bot') {
              console.log('Ignoring bot PR');
              return;
            }

            if (title.length < 10) {
              console.log('Title too short, skipping duplicate check');
              return;
            }

            // Normalize title
            const normalize = str =>
              str.toLowerCase()
                 .replace(/[^a-z0-9\s]/g, '')
                 .replace(/\s+/g, ' ')
                 .trim();

            const current = normalize(title);

            // Fetch open PRs
            const existingPRs = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'open',
                per_page: 100
              }
            );

            let duplicatePR = null;
            for (const existing of existingPRs) {
              if (existing.number === prNumber) continue;
              const existingTitle = normalize(existing.title || '');
              if (existingTitle === current) {
                duplicatePR = existing;
                break;
              }
            }

            if (!duplicatePR) {
              console.log('No duplicate PR found');
              return;
            }

            // Build comment
            const body = `## 🔁 Possible Duplicate PR Detected\n\n` +
              `Hi @${username}, a PR with a very similar title already exists:\n\n` +
              `➡️ #${duplicatePR.number}\n\n` +
              `Please check if your changes overlap with the existing PR.\n\n` +
              `This is just a heads-up. The PR will **not** be auto-closed.`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });

            // Add label
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ['possible-duplicate-pr']
              });
            } catch (e) {
              console.log('Label already exists or error');
            }

            console.log(`Duplicate PR detected: #${prNumber} → #${duplicatePR.number}`);
