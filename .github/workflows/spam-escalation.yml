name: 🚨 Spam Escalation System

on:
  issues:
    types:
      - labeled

  pull_request_target:
    types:
      - labeled

permissions:
  issues: write
  pull-requests: write
  contents: read

concurrency:
  group: spam-escalation-${{ github.event.label.name }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  handle-spam:
    if: github.event.label.name == 'spam'

    runs-on: ubuntu-latest

    steps:
      - name: Handle spam escalation
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const isPR = !!context.payload.pull_request;

            const item = isPR
              ? context.payload.pull_request
              : context.payload.issue;

            const number = item.number;
            const username = item.user.login;

            // ─────────────────────────────────────────────
            // Ignore bots
            // ─────────────────────────────────────────────
            if (item.user.type === 'Bot') {
              core.info('Ignoring bot.');
              return;
            }

            // ─────────────────────────────────────────────
            // Ignore maintainers/collaborators
            // ─────────────────────────────────────────────
            const association =
              item.author_association || '';

            const exemptRoles = [
              'OWNER',
              'MEMBER',
              'COLLABORATOR'
            ];

            if (exemptRoles.includes(association)) {
              core.info('Ignoring maintainer/collaborator.');
              return;
            }

            // ─────────────────────────────────────────────
            // Search previous spam-labeled issues/PRs
            // ─────────────────────────────────────────────
            const searchQuery =
              `repo:${owner}/${repo} label:spam author:${username}`;

            const search = await github.rest.search.issuesAndPullRequests({
              q: searchQuery,
              per_page: 100
            });

            const spamCount = search.data.items.length;

            core.info(`Spam count for ${username}: ${spamCount}`);

            // ─────────────────────────────────────────────
            // First warning
            // ─────────────────────────────────────────────
            if (spamCount <= 1) {

              const warningMessage =
                `## ⚠️ Low-Quality Contribution Warning\n\n` +
                `Hi @${username}, this ${isPR ? 'pull request' : 'issue'} ` +
                `has been marked as \`spam\` due to low-effort, incomplete, ` +
                `AI-slop, duplicate, or non-meaningful contribution patterns.\n\n` +

                `Please carefully read the repository contribution guidelines before submitting again.\n\n` +

                `Repeated low-quality submissions may be escalated to the appropriate program admins/moderators.\n\n` +

                `This is currently only a warning.`;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body: warningMessage
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Escalation
            // ─────────────────────────────────────────────
            const escalationMessage =
              `## 🚨 Contribution Escalation Notice\n\n` +
              `Hi @${username}, multiple issues/PRs from your account ` +
              `have been marked as \`spam\` due to repeated low-quality ` +
              `or non-meaningful submissions.\n\n` +

              `This case may now be escalated to the appropriate ` +
              `program admins/moderators for further review.\n\n` +

              `Please avoid:\n` +
              `- AI-slop submissions\n` +
              `- spam PRs/issues\n` +
              `- duplicate submissions\n` +
              `- low-effort changes\n` +
              `- template bypassing\n\n` +

              `Future submissions may be automatically closed if the behavior continues.`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: escalationMessage
            });

            // ─────────────────────────────────────────────
            // Add escalation label
            // ─────────────────────────────────────────────
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: number,
                labels: ['escalated']
              });
            } catch (err) {
              core.warning(`Could not add escalation label: ${err.message}`);
            }