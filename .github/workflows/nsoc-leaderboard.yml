name: 📊 NSoC Contributor Leaderboard

on:
  pull_request_target:
    types:
      - opened
      - closed
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: nsoc-pr-comments-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  leaderboard:
    runs-on: ubuntu-latest

    steps:
      # SAFE:
      # checkout only trusted base repo code
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate leaderboard comment
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_STATE: ${{ github.event.pull_request.state }}
          PR_ACTION: ${{ github.event.action }}
        run: |
          node .github/scripts/generate-leaderboard-comment.js > comment.md

      - name: Post PR comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('comment.md', 'utf8');

            // Prevent duplicate bot comments
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              }
            );

            const alreadyCommented = comments.some(comment =>
              comment.user &&
              comment.user.type === 'Bot' &&
              comment.body.includes('Monthly Leaderboard')
            );

            if (alreadyCommented && context.payload.action === 'opened') {
              core.info('Leaderboard comment already exists.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            core.info('Leaderboard comment posted.');