name: 📊 NSoC Contributor Leaderboard

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - closed

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: nsoc-leaderboard-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  leaderboard:
    runs-on: ubuntu-latest

    steps:
      # SAFE:
      # only checkout trusted base repo
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate leaderboard comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          PR_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          node .github/scripts/generate-leaderboard-comment.js > comment.md

      - name: Post PR comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('comment.md', 'utf8');

            if (!body.trim()) {
              core.info('Leaderboard comment is empty, skipping.');
              return;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              }
            );

            const marker =
              `leaderboard-${context.payload.action}`;

            const alreadyExists = comments.some(comment =>
              comment.user &&
              comment.user.type === 'Bot' &&
              comment.body.includes(marker)
            );

            if (alreadyExists) {
              core.info('Leaderboard comment already exists.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            core.info('Leaderboard comment posted.');