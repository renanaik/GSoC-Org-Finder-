name: Refresh Good First Issues

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch issues
        run: node scripts/fetch-issues.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: refresh good first issues [skip ci]'
          title: 'chore: refresh good first issues'
          body: 'Automated refresh of good first issues'
          branch: refresh-issues
          delete-branch: true
          add-paths: |
            data/issues.json
