name: 🔑 PA / Maintainer Final Gate

on:
  pull_request_review:
    types:
      - submitted
      - dismissed

  pull_request_target:
    types:
      - labeled
      - unlabeled
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: pa-final-gate-${{ github.event.pull_request.number || github.event.pull_request_review.pull_request.number }}
  cancel-in-progress: true

jobs:
  pa-gate:
    name: PA Final Gate
    runs-on: ubuntu-latest

    if: |
      !github.event.pull_request.draft

    steps:
      - name: Evaluate PA approval state
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const pr =
              context.payload.pull_request;

            if (!pr) {
              core.info('No PR context found.');
              return;
            }

            const prNumber = pr.number;

            // ─────────────────────────────────────────────
            // Helpers
            // ─────────────────────────────────────────────
            const addLabel = async (label) => {

              try {

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: [label]
                });

              } catch (err) {

                core.info(
                  `Failed adding label '${label}': ${err.message}`
                );
              }
            };

            const removeLabel = async (label) => {

              try {

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: label
                });

              } catch (_) {}
            };

            // ─────────────────────────────────────────────
            // Current labels
            // ─────────────────────────────────────────────
            const labels =
              (pr.labels || []).map(
                label => label.name
              );

            const hasLabel = (name) =>
              labels.includes(name);

            const stage1Complete =
              hasLabel('stage-1-approved');

            const stage2Complete =
              hasLabel('gssoc-mentor-approved') ||
              hasLabel('nsoc-reviewed');

            // ─────────────────────────────────────────────
            // Fetch all reviews
            // ─────────────────────────────────────────────
            const reviews =
              await github.paginate(
                github.rest.pulls.listReviews,
                {
                  owner,
                  repo,
                  pull_number: prNumber
                }
              );

            // ─────────────────────────────────────────────
            // Latest review state per reviewer
            // ─────────────────────────────────────────────
            const latestReviews = new Map();

            for (const review of reviews) {

              latestReviews.set(
                review.user.login.toLowerCase(),
                review
              );
            }

            // ─────────────────────────────────────────────
            // Find maintainer approvals
            // ─────────────────────────────────────────────
            let maintainerApproved = false;

            for (const [, review] of latestReviews) {

              if (review.state !== 'APPROVED') {
                continue;
              }

              const reviewer =
                review.user.login;

              // Prevent self-approval
              if (
                reviewer.toLowerCase() ===
                pr.user.login.toLowerCase()
              ) {
                continue;
              }

              try {

                const { data: permission } =
                  await github.rest.repos.getCollaboratorPermissionLevel({
                    owner,
                    repo,
                    username: reviewer
                  });

                const isMaintainer =
                  ['admin', 'maintain', 'write']
                    .includes(permission.permission);

                if (isMaintainer) {

                  maintainerApproved = true;

                  core.info(
                    `Valid maintainer approval from @${reviewer}`
                  );

                  break;
                }

              } catch (err) {

                core.info(
                  `Permission lookup failed for @${reviewer}: ${err.message}`
                );
              }
            }

            // ─────────────────────────────────────────────
            // No maintainer approval
            // ─────────────────────────────────────────────
            if (!maintainerApproved) {

              core.info(
                'No valid maintainer approval found.'
              );

              await removeLabel('pa-review');
              await removeLabel('merge-ready');

              return;
            }

            // ─────────────────────────────────────────────
            // Maintainer approved
            // ─────────────────────────────────────────────
            await addLabel('pa-review');

            // ─────────────────────────────────────────────
            // Final merge-ready gate
            // ─────────────────────────────────────────────
            if (
              stage1Complete &&
              stage2Complete
            ) {

              core.info(
                'All stages complete — applying merge-ready.'
              );

              await addLabel('merge-ready');

            } else {

              core.info(
                'Waiting for Stage 1 or Stage 2 completion.'
              );

              await removeLabel('merge-ready');
            }

            // ─────────────────────────────────────────────
            // Remove stale needs-fixes
            // ─────────────────────────────────────────────
            if (
              hasLabel('merge-ready') &&
              hasLabel('needs-fixes')
            ) {

              await removeLabel('needs-fixes');
            }
