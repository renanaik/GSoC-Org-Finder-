name: 🔁 Duplicate Issue Detector

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: read
  issues: write

concurrency:
  group: duplicate-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-duplicate:
    runs-on: ubuntu-latest

    steps:
      - name: Detect duplicate issues
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issue = context.payload.issue;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue_number = issue.number;
            const username = issue.user.login;

            const title =
              (issue.title || '').trim();

            // ─────────────────────────────────────────────
            // Ignore bots
            // ─────────────────────────────────────────────
            if (issue.user.type === 'Bot') {
              core.info('Ignoring bot issue');
              return;
            }

            // ─────────────────────────────────────────────
            // Ignore research-labelled issues
            // ─────────────────────────────────────────────
            const labels =
              (issue.labels || []).map(
                l => l.name.toLowerCase()
              );

            if (labels.includes('research')) {
              core.info(
                'Research issue detected — skipping duplicate checks.'
              );
              return;
            }

            // ─────────────────────────────────────────────
            // Helper → prevent comment spam
            // ─────────────────────────────────────────────
            async function upsertComment(marker, body) {

              const comments =
                await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                });

              const existing =
                comments.data.find(c =>
                  c.user.type === 'Bot' &&
                  c.body.includes(marker)
                );

              if (existing) {

                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });

              } else {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                });

              }
            }

            // ─────────────────────────────────────────────
            // Normalize title
            // ─────────────────────────────────────────────
            const normalize = str =>
              str
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            const currentTitle =
              normalize(title);

            // ─────────────────────────────────────────────
            // Fetch existing issues
            // ─────────────────────────────────────────────
            const existingIssues =
              await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100
                }
              );

            let duplicateIssue = null;

            for (const existing of existingIssues) {

              // Ignore current issue
              if (existing.number === issue_number)
                continue;

              // Ignore pull requests
              if (existing.pull_request)
                continue;

              // Ignore research-labelled issues
              const existingLabels =
                (existing.labels || []).map(
                  l => l.name.toLowerCase()
                );

              if (
                existingLabels.includes('research')
              ) {
                continue;
              }

              const existingTitle =
                normalize(existing.title || '');

              // Exact normalized match only
              if (existingTitle === currentTitle) {

                duplicateIssue = existing;
                break;
              }
            }

            // ─────────────────────────────────────────────
            // Duplicate detected
            // ─────────────────────────────────────────────
            if (duplicateIssue) {

              const bodyText =
                `## 🔁 Duplicate Issue Detected\n\n` +
                `Hi @${username}, this issue appears to duplicate:\n\n` +
                `➡️ #${duplicateIssue.number}\n\n` +
                `To keep discussion centralized, maintainers may close this issue.\n\n` +
                `If you believe this is different, please provide additional technical context.`;


              await upsertComment(
                'Duplicate Issue Detected',
                bodyText
              );

              try {

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['duplicate']
                });

              } catch (err) {
                core.info(err.message);
              }

              return;
            }

            core.info('No duplicate detected');
