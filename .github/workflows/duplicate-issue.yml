name: 🔁 Duplicate Issue Detector

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write
  contents: read

concurrency:
  group: duplicate-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-duplicate:
    runs-on: ubuntu-latest
    steps:
      - name: Detect duplicate issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = issue.user.login;
            const title = (issue.title || '').trim();

            // Ignore bots
            if (issue.user.type === 'Bot') {
              console.log('Ignoring bot issue');
              return;
            }

            // Fetch current labels
            const labels = (issue.labels || []).map(l => l.name.toLowerCase());

            // Skip research issues
            if (labels.includes('research')) {
              console.log('Research issue — skipping duplicate check');
              return;
            }

            // Helper: Upsert comment (prevents spam)
            async function upsertComment(marker, body) {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number, per_page: 100
              });

              const existing = comments.find(c => 
                c.user.type === 'Bot' && c.body.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number, body
                });
              }
            }

            // Normalize title for comparison
            const normalize = str => 
              str
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            const currentTitle = normalize(title);

            if (currentTitle.length < 8) {
              console.log('Title too short — skipping duplicate check');
              return;
            }

            // Fetch all open issues
            const existingIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: 'open',
                per_page: 100
              }
            );

            let duplicateIssue = null;

            for (const existing of existingIssues) {
              if (existing.number === issue_number) continue;
              if (existing.pull_request) continue; // skip PRs

              const existingLabels = (existing.labels || []).map(l => l.name.toLowerCase());
              if (existingLabels.includes('research')) continue;

              const existingTitle = normalize(existing.title || '');

              // Match if normalized titles are identical
              if (existingTitle === currentTitle) {
                duplicateIssue = existing;
                break;
              }
            }

            // Duplicate found
            if (duplicateIssue) {
              const bodyText = `## 🔁 Duplicate Issue Detected

Hi @${username}, this issue looks very similar to an existing one:

➡️ #${duplicateIssue.number} — [View it here](/${owner}/${repo}/issues/${duplicateIssue.number})

To keep discussions organized, maintainers may close this issue as duplicate.

If you believe this is a **different** issue, please comment with more details and reference the other issue.`;

              await upsertComment('Duplicate Issue Detected', bodyText);

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['duplicate']
                });
              } catch (e) {
                console.log('Label already exists');
              }

              console.log(`Duplicate detected: #${issue_number} → #${duplicateIssue.number}`);
              return;
            }

            console.log('No duplicate found for issue #' + issue_number);
