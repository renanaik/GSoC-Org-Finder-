name: 🔁 Duplicate Issue Detector

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write
  contents: read

concurrency:
  group: duplicate-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-duplicate:
    runs-on: ubuntu-latest
    steps:
      - name: Detect duplicate issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = issue.user.login;
            const title = (issue.title || '').trim();

            if (issue.user.type === 'Bot') return;
            
            const labels = (issue.labels || []).map(l => l.name.toLowerCase());
            if (labels.includes('research')) return;
            
            if (title.length < 8) return;

            const normalize = str => 
              str.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
            
            const currentTitle = normalize(title);

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, 
              repo, 
              state: 'open', 
              per_page: 100
            });

            let duplicateIssue = null;
            for (const existing of existingIssues) {
              if (existing.number === issue_number || existing.pull_request) continue;
              if ((existing.labels || []).some(l => l.name.toLowerCase() === 'research')) continue;

              if (normalize(existing.title || '') === currentTitle) {
                duplicateIssue = existing;
                break;
              }
            }

            if (duplicateIssue) {
              const bodyText = `## 🔁 Duplicate Issue Detected\n\n` +
                `Hi @${username}, this issue appears to be a duplicate of:\n\n` +
                `➡️ #${duplicateIssue.number}\n\n` +
                `Maintainers may close this issue to keep discussion in one place.\n\n` +
                `If this is not a duplicate, please explain the difference.`;

              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number, per_page: 100
              });

              const marker = '<!-- duplicate-detector -->';
              const existingComment = comments.find(c => c.body.includes(marker));

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner, 
                  repo, 
                  comment_id: existingComment.id, 
                  body: bodyText
                });
              } else {
                await github.rest.issues.createComment({
                  owner, 
                  repo, 
                  issue_number, 
                  body: bodyText
                });
              }

              await github.rest.issues.addLabels({
                owner, 
                repo, 
                issue_number, 
                labels: ['duplicate']
              }).catch(() => {});
            }
