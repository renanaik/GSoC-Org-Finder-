name: ✅ Stage 2 - Review Approval Handler

on:
  pull_request_review:
    types:
      - submitted

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: stage2-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  handle-review-approval:
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'

    steps:
      - name: Process Stage 2 Approval
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const reviewer = context.payload.review.user.login;
            const prNumber = pr.number;

            if (reviewer.toLowerCase() === pr.user.login.toLowerCase()) {
              core.info('Self-approval ignored.');
              return;
            }

            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber
            });
            const labels = labelData.map(l => l.name.toLowerCase());

            const isGssoc = labels.includes('gssoc26');
            const isNsoc = labels.includes('nsoc26');
            const stage1Passed = labels.includes('stage-1-approved');

            if (!stage1Passed) {
              core.info('Stage 1 not passed. Ignoring review approval for Stage 2.');
              return;
            }

            async function addLabel(label) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber, labels: [label]
                });
              } catch (e) { core.warning(`Failed adding label '${label}': ${e?.message || e}`); }
            }

            if (isGssoc) {
              let mentorList = [];
              try {
                const { data: file } = await github.rest.repos.getContent({
                  owner, repo, path: '.github/reviewers/gssoc-mentors.json', ref: 'main'
                });
                const content = Buffer.from(file.content, 'base64').toString('utf8');
                mentorList = (JSON.parse(content).reviewers || []).map(r => r.toLowerCase());
              } catch (e) {
                core.warning(`Failed to load mentor list: ${e?.message || e}`);
                return;
              }

              if (!mentorList.includes(reviewer.toLowerCase())) {
                core.info(`@${reviewer} is not a GSSOC mentor. Ignoring.`);
                return;
              }

              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                { owner, repo, pull_number: prNumber }
              );

              const mentorApprovals = new Set();
              for (const review of reviews) {
                if (review.state !== 'APPROVED') continue;
                if (mentorList.includes(review.user.login.toLowerCase())) {
                  mentorApprovals.add(review.user.login.toLowerCase());
                }
              }

              core.info(`GSSOC mentor approvals: ${mentorApprovals.size} (${Array.from(mentorApprovals).join(', ')})`);

              if (mentorApprovals.size >= 1) {
                await addLabel('gssoc-mentor-approved');
                core.info('Stage 2 complete: GSSOC mentor approved.');
              }
            } else if (isNsoc) {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner, repo, state: 'closed', per_page: 100
              });

              const nsocMergedUsers = new Set();
              for (const p of prs) {
                if (!p.merged_at) continue;
                const prLabels = (p.labels || []).map(l => l.name.toLowerCase());
                if (prLabels.includes('nsoc26') && p.user && p.user.login) {
                  nsocMergedUsers.add(p.user.login.toLowerCase());
                }
              }

              if (!nsocMergedUsers.has(reviewer.toLowerCase())) {
                core.info(`@${reviewer} has no merged NSOC PRs. Ignoring for NSOC review.`);
                return;
              }

              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                { owner, repo, pull_number: prNumber }
              );

              const nsocApprovals = new Set();
              for (const review of reviews) {
                if (review.state !== 'APPROVED') continue;
                if (nsocMergedUsers.has(review.user.login.toLowerCase())) {
                  nsocApprovals.add(review.user.login.toLowerCase());
                }
              }

              core.info(`NSOC reviewer approvals: ${nsocApprovals.size}`);

              if (nsocApprovals.size >= 1) {
                await addLabel('nsoc-reviewed');
                core.info('Stage 2 complete: NSOC reviewer approved.');
              }
            }
