name: 🛡️ Duplicate & Spam Issue Guard

on:
  issues:
    types:
      - opened
      - edited

  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

concurrency:
  group: duplicate-issue-guard-${{ github.event.issue.number || github.event.comment.id }}
  cancel-in-progress: false

jobs:
  validate-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Detect duplicate / spam issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issue =
              context.payload.issue;

            const owner =
              context.repo.owner;

            const repo =
              context.repo.repo;

            const issue_number =
              issue.number;

            const username =
              issue.user.login;

            const title =
              (issue.title || '').trim();

            const body =
              (issue.body || '').trim();

            const lowerText =
              `${title}\n${body}`.toLowerCase();

            // ─────────────────────────────────────────────
            // Ignore bots
            // ─────────────────────────────────────────────
            if (issue.user.type === 'Bot') {
              core.info('Ignoring bot issue.');
              return;
            }

            // ─────────────────────────────────────────────
            // Ignore research-labelled issues
            // ─────────────────────────────────────────────
            const labels =
              (issue.labels || []).map(l =>
                l.name.toLowerCase()
              );

            const isResearch =
              labels.includes('research');

            // Research issues bypass duplication detection
            if (isResearch) {
              core.info('Research issue detected. Skipping duplicate validation.');
              return;
            }

            // ─────────────────────────────────────────────
            // Detect obvious AI/slop prompts
            // ─────────────────────────────────────────────
            const blockedPatterns = [
              'as an ai',
              'chatgpt',
              'copilot',
              'claude',
              'gemini',
              'llm',
              'write a pr',
              'generate code',
              'generated by ai',
              'prompt:',
              'here is the prompt',
              'fix this issue completely',
              'create a full implementation',
              'give complete code',
              'auto-generated',
              'ai generated'
            ];

            const detectedPrompt =
              blockedPatterns.find(p =>
                lowerText.includes(p)
              );

            if (detectedPrompt) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `## 🚫 Low-Quality / AI-Generated Issue Detected\n\n` +
                  `Hi @${username}, this issue appears to contain AI-generated or low-quality content.\n\n` +
                  `Detected pattern: \`${detectedPrompt}\`\n\n` +
                  `Please rewrite the issue clearly with:\n` +
                  `- proper explanation\n` +
                  `- reproducible details\n` +
                  `- actual project context\n\n` +
                  `Closing this issue for now.`
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed'
              });

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['spam', 'invalid']
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Detect duplicate issues
            // ─────────────────────────────────────────────
            const existingIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: 'open',
                per_page: 100
              }
            );

            const normalize = str =>
              str
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            const normalizedCurrent =
              normalize(title);

            let duplicateIssue = null;

            for (const existing of existingIssues) {

              if (existing.number === issue_number)
                continue;

              // Ignore PRs
              if (existing.pull_request)
                continue;

              // Ignore research-labelled issues
              const existingLabels =
                (existing.labels || []).map(l =>
                  l.name.toLowerCase()
                );

              if (existingLabels.includes('research'))
                continue;

              const normalizedExisting =
                normalize(existing.title || '');

              // Exact title match
              if (
                normalizedExisting === normalizedCurrent
              ) {
                duplicateIssue = existing;
                break;
              }

              // High similarity containment
              if (
                normalizedExisting.includes(normalizedCurrent) ||
                normalizedCurrent.includes(normalizedExisting)
              ) {
                duplicateIssue = existing;
                break;
              }
            }

            // ─────────────────────────────────────────────
            // Close duplicate issue
            // ─────────────────────────────────────────────
            if (duplicateIssue) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `## 🔁 Duplicate Issue Detected\n\n` +
                  `Hi @${username}, this issue appears to be a duplicate of:\n\n` +
                  `➡️ #${duplicateIssue.number}\n\n` +
                  `To keep discussions centralized and avoid fragmented work, this issue will be closed.\n\n` +
                  `If you believe this was closed incorrectly, please explain with additional technical context.`
              });

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['duplicate']
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Handle old issues during /assign
            // ─────────────────────────────────────────────
            if (context.eventName === 'issue_comment') {

              const comment =
                context.payload.comment.body.toLowerCase();

              const wantsAssign =
                comment.includes('/assign') ||
                comment.includes('assign me');

              if (!wantsAssign) {
                return;
              }

              // Re-check spam quality
              if (title.length < 8 || body.length < 30) {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body:
                    `⚠️ @${username}, this issue is too low-quality for assignment.\n\n` +
                    `Please improve:\n` +
                    `- title clarity\n` +
                    `- issue explanation\n` +
                    `- reproduction details`
                });

                return;
              }
            }

            core.info('Issue validation passed.');