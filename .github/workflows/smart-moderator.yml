name: 🛡️ Smart Issue Moderation

on:
  issues:
    types:
      - opened
      - edited

  issue_comment:
    types:
      - created

permissions:
  issues: write
  contents: read

concurrency:
  group: smart-issue-moderation-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  moderate:
    runs-on: ubuntu-latest

    steps:
      - name: Moderate issue quality
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ─────────────────────────────────────────────
            // Detect trigger source
            // ─────────────────────────────────────────────
            const isIssueEvent =
              context.eventName === 'issues';

            const isCommentEvent =
              context.eventName === 'issue_comment';

            const issue = isIssueEvent
              ? context.payload.issue
              : context.payload.issue;

            const issue_number = issue.number;

            const username = isIssueEvent
              ? issue.user.login
              : context.payload.sender.login;

            const senderType = isIssueEvent
              ? issue.user.type
              : context.payload.sender.type;

            const commentBody = isCommentEvent
              ? (context.payload.comment.body || '').toLowerCase()
              : '';

            // ─────────────────────────────────────────────
            // Run moderation on:
            // 1. issue open/edit
            // 2. assign me comments
            // ─────────────────────────────────────────────
            if (isCommentEvent) {
              const wantsAssign =
                commentBody.includes('/assign') ||
                commentBody.includes('assign me');

              if (!wantsAssign) {
                core.info('Not an assignment comment.');
                return;
              }

              core.info('Assignment comment detected. Running moderation.');
            }

            // ─────────────────────────────────────────────
            // Ignore maintainers
            // ─────────────────────────────────────────────
            const maintainers = [
              'S3DFX-CYBER'
            ];

            if (maintainers.includes(username)) {
              core.info('Maintainer detected. Skipping moderation.');
              return;
            }

            const title = (issue.title || '').trim();
            const body = (issue.body || '').trim();

            const fullText =
              `${title}\n${body}`.toLowerCase();

            // ─────────────────────────────────────────────
            // Detect suspicious AI/bot usernames
            // ─────────────────────────────────────────────
            const suspiciousUserPatterns = [
              'bot',
              'gpt',
              'copilot',
              'ai-agent',
              'assistant',
              'autogen',
              'claude',
              'gemini'
            ];

            const suspiciousUser =
              suspiciousUserPatterns.some(p =>
                username.toLowerCase().includes(p)
              );

            if (
              senderType === 'Bot' ||
              suspiciousUser
            ) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ Bot/AI-generated issues or automated contributor accounts are not allowed in this repository.'
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Detect AI-generated issue content
            // ─────────────────────────────────────────────
            const aiPatterns = [
              'chatgpt',
              'openai',
              'claude ai',
              'gemini ai',
              'as an ai',
              'prompt:',
              'generate a bug report',
              'write an issue',
              'ai generated',
              'copilot generated',
              'rewrite this issue',
              'make this more professional',
              'dear maintainer',
              'certainly! here',
              'sure, here is',
              'hope this helps',
              'this issue was generated',
              'large language model',
              'llm'
            ];

            const matchedAiPatterns =
              aiPatterns.filter(p =>
                fullText.includes(p)
              );

            if (matchedAiPatterns.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ This issue appears to contain AI-generated or prompt-leaked content.\n\n' +
                  'Detected patterns:\n' +
                  matchedAiPatterns
                    .map(p => `- \`${p}\``)
                    .join('\n') +
                  '\n\nPlease rewrite the issue manually with proper repository-specific details.'
              });

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['invalid']
                });
              } catch (err) {
                core.warning(err.message);
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Validate issue quality
            // ─────────────────────────────────────────────
            if (title.length < 10) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ Issue title is too short.\n\nPlease provide a meaningful repository-specific title.'
              });

              return;
            }

            if (body.length < 40) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ Issue description is too short.\n\nPlease provide:\n' +
                  '- proper reproduction steps\n' +
                  '- expected vs actual behavior\n' +
                  '- repository-specific details'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Detect duplicate issues
            // ─────────────────────────────────────────────
            const existingIssues =
              await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100
                }
              );

            const normalize = text =>
              text
                .toLowerCase()
                .replace(/[^a-z0-9 ]/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            const currentTitle =
              normalize(title);

            let duplicateIssue = null;

            for (const existing of existingIssues) {
              if (existing.number === issue_number)
                continue;

              const existingTitle =
                normalize(existing.title || '');

              // Exact match
              if (existingTitle === currentTitle) {
                duplicateIssue = existing;
                break;
              }

              // Similarity match
              const currentWords =
                currentTitle.split(' ');

              const existingWords =
                existingTitle.split(' ');

              const overlap =
                currentWords.filter(w =>
                  existingWords.includes(w)
                );

              const similarity =
                overlap.length /
                Math.max(
                  currentWords.length,
                  existingWords.length
                );

              if (similarity >= 0.75) {
                duplicateIssue = existing;
                break;
              }
            }

            // ─────────────────────────────────────────────
            // Handle duplicates
            // ─────────────────────────────────────────────
            if (duplicateIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `⚠️ This issue appears to be a duplicate of #${duplicateIssue.number}\n\n` +
                  `Please continue discussion there instead.\n\n` +
                  `Closing as duplicate.`
              });

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['duplicate']
                });
              } catch (err) {
                core.warning(err.message);
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Passed moderation
            // ─────────────────────────────────────────────
            core.info('Issue passed moderation checks.');