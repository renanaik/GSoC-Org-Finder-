name: 🛡️ Smart Issue Moderation

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write
  contents: read

concurrency:
  group: smart-issue-moderation-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  moderate:
    runs-on: ubuntu-latest

    steps:
      - name: Moderate issue quality
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue_number = issue.number;

            const title = (issue.title || '').trim();
            const body = (issue.body || '').trim();

            const fullText = `${title}\n${body}`.toLowerCase();

            const username = issue.user.login;

            // ─────────────────────────────────────────────
            // Ignore maintainers
            // ─────────────────────────────────────────────
            const maintainers = [
              'S3DFX-CYBER'
            ];

            if (maintainers.includes(username)) {
              core.info('Maintainer issue detected. Skipping moderation.');
              return;
            }

            // ─────────────────────────────────────────────
            // Detect obvious bot/AI accounts
            // ─────────────────────────────────────────────
            const suspiciousUserPatterns = [
              'bot',
              'gpt',
              'copilot',
              'ai-agent',
              'assistant',
              'autogen',
              'claude',
              'gemini'
            ];

            const suspiciousUser = suspiciousUserPatterns.some(p =>
              username.toLowerCase().includes(p)
            );

            if (suspiciousUser) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ Automated bot/AI-generated issue accounts are not allowed in this repository.\n\n' +
                  'Closing this issue automatically.'
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Detect AI-slop / prompt leakage
            // ─────────────────────────────────────────────
            const aiPatterns = [
              'chatgpt',
              'openai',
              'claude ai',
              'gemini ai',
              'as an ai',
              'here is the prompt',
              'generate a bug report',
              'write an issue',
              'ai generated',
              'prompt:',
              'fix this issue using',
              'copilot generated',
              'llm',
              'large language model',
              'this issue was generated',
              'rewrite this issue',
              'make this more professional',
              'dear maintainer',
              'certainly! here',
              'sure, here is',
              'i apologize',
              'hope this helps'
            ];

            const matchedAiPatterns = aiPatterns.filter(p =>
              fullText.includes(p)
            );

            if (matchedAiPatterns.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ This issue appears to contain AI-generated/promotional/prompt-leaked content.\n\n' +
                  'Detected patterns:\n' +
                  matchedAiPatterns.map(p => `- \`${p}\``).join('\n') +
                  '\n\nPlease rewrite the issue manually with clear reproduction details and repository-specific context.'
              });

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['invalid']
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Validate minimum quality
            // ─────────────────────────────────────────────
            if (title.length < 10 || body.length < 40) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  '❌ Issue quality check failed.\n\n' +
                  'Please provide:\n' +
                  '- a meaningful title\n' +
                  '- proper reproduction steps\n' +
                  '- expected vs actual behavior\n' +
                  '- repository-specific context'
              });

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['needs-more-info']
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Search for duplicate issues
            // ─────────────────────────────────────────────
            const existingIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: 'open',
                per_page: 100
              }
            );

            const normalize = (text) =>
              text
                .toLowerCase()
                .replace(/[^a-z0-9 ]/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            const currentTitle = normalize(title);

            let duplicateIssue = null;

            for (const existing of existingIssues) {
              if (existing.number === issue_number) continue;

              const existingTitle = normalize(existing.title || '');

              // Exact match
              if (existingTitle === currentTitle) {
                duplicateIssue = existing;
                break;
              }

              // Partial similarity
              const currentWords = currentTitle.split(' ');
              const existingWords = existingTitle.split(' ');

              const overlap = currentWords.filter(w =>
                existingWords.includes(w)
              );

              const similarity =
                overlap.length /
                Math.max(currentWords.length, existingWords.length);

              if (similarity >= 0.75) {
                duplicateIssue = existing;
                break;
              }
            }

            // ─────────────────────────────────────────────
            // Handle duplicates
            // ─────────────────────────────────────────────
            if (duplicateIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `⚠️ This issue appears to be a duplicate of #${duplicateIssue.number}\n\n` +
                  `Please continue discussion there instead.\n\n` +
                  `Closing as duplicate.`
              });

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['duplicate']
                });
              } catch (err) {
                core.warning(err.message);
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: 'closed'
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Passed moderation
            // ─────────────────────────────────────────────
            core.info('Issue passed moderation checks.');