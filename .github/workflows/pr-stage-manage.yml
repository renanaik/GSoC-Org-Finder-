name: 🚦 PR Stage Manager

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: pr-stage-manager-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  stage-manager:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate PR Pipeline
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            // Small delay for other workflows to apply labels
            if (['opened', 'synchronize'].includes(context.payload.action)) {
              await new Promise(r => setTimeout(r, 8000));
            }

            // Fetch current labels
            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber
            });
            const labels = labelData.map(l => l.name.toLowerCase());

            // Detect Program
            const isGSSOC = labels.includes('gssoc26');
            const isNSOC = labels.includes('nsoc26');

            // Stage 1 Checks
            const dcoVerified = labels.includes('dco-verified');
            const dcoMissing = labels.includes('dco-missing');
            const aiSlop = labels.includes('ai-slop');
            const duplicatePR = labels.includes('possible-duplicate-pr');

            const stage1Passed = dcoVerified && !dcoMissing && !aiSlop;

            // Helper functions
            async function addLabel(name) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [name] });
              } catch (e) {}
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name });
              } catch (e) {}
            }

            // Stage 1 Label Management
            if (stage1Passed) {
              await addLabel('stage-1-approved');
              await removeLabel('needs-stage-1-fixes');
            } else {
              await removeLabel('stage-1-approved');
              await addLabel('needs-stage-1-fixes');
            }

            // Stage 2 & 3
            const mentorApproved = labels.includes('mentor-approved');
            const reviewerApproved = labels.includes('review-approved');
            const paApproved = labels.includes('pa-approved');

            // Build Status
            let s1Icon = '⏳', s1Text = 'Waiting for automated checks';
            if (stage1Passed) {
              s1Icon = '✅';
              s1Text = 'Stage 1 — All automated checks passed';
            } else if (dcoMissing || aiSlop) {
              s1Icon = '❌';
              s1Text = 'Stage 1 — Failed (fix required)';
            }

            let s2Icon = '🔒', s2Text = 'Blocked until Stage 1 passes';
            if (stage1Passed) {
              s2Icon = '⏳';
              s2Text = isGSSOC 
                ? 'Waiting for GSSOC Mentor Review' 
                : 'Waiting for Reviewer Approval';
              if (mentorApproved || reviewerApproved) {
                s2Icon = '✅';
                s2Text = isGSSOC 
                  ? 'Stage 2 — GSSOC Mentor Approved' 
                  : 'Stage 2 — Reviewer Approved';
              }
            }

            let s3Icon = '🔒', s3Text = 'Blocked until Stage 2 passes';
            if (mentorApproved || reviewerApproved) {
              s3Icon = '⏳';
              s3Text = 'Waiting for Project Admin / Maintainer';
              if (paApproved) {
                s3Icon = '✅';
                s3Text = 'Stage 3 — Approved for Merge';
              }
            }

            // Details
            const details = [];
            if (!dcoVerified) details.push('DCO verification pending');
            if (dcoMissing) details.push('DCO sign-off missing on commits');
            if (aiSlop) details.push('AI/Slop detection triggered');
            if (duplicatePR) details.push('Possible duplicate PR');

            const typeBadge = isGSSOC 
              ? '> 🟢 **GSSOC PR**' 
              : isNSOC 
                ? '> 🔵 **NSOC PR**' 
                : '> ⚪ **Standard PR**';

            const marker = '<!-- pr-stage-manager -->';

            const body = `${marker}
## 🚦 PR Review Pipeline
${typeBadge}

| Stage | Status |
|-------|--------|
| **Stage 1 — Automated** | ${s1Icon} ${s1Text} |
| **Stage 2 — Human Review** | ${s2Icon} ${s2Text} |
| **Stage 3 — Final Review** | ${s3Icon} ${s3Text} |

${details.length > 0 ? details.map(d => `> - ${d}`).join('\n') : '> - No active issues'}

---
**Last updated:** ${new Date().toUTCString()}
`;

            // Upsert comment
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 50
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
              console.log('Updated pipeline status comment');
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body
              });
              console.log('Created new pipeline status comment');
            }
