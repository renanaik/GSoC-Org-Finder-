name: 👋 PR Welcome

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: pr-welcome-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment + apply routing label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = pr.number;
            const author = pr.user.login;

            // GSSOC Detection
            const branch = (pr.head.ref || '').toLowerCase();
            const body = (pr.body || '').toLowerCase();
            const labels = (pr.labels || []).map(l => l.name.toLowerCase());
            
            const isGssoc = 
              labels.includes('gssoc26') ||
              branch.includes('gssoc') ||
              body.includes('gssoc');

            // Idempotency Check
            const { data: existing } = await github.rest.issues.listComments({
              owner, repo, issue_number: number, per_page: 100
            });

            const MARKER = '<!-- pr-welcome-v1 -->';
            if (existing.some(c => c.body.includes(MARKER))) {
              console.log('Welcome comment already posted — skipping.');
              return;
            }

            // Build Comment
            const programNote = isGssoc
              ? `> 🟢 **GSSOC PR detected** — your PR will be routed to an approved GSSOC mentor for Stage 2 review.`
              : `> ⚪ **NSOC PR detected** — your PR will be reviewed by a repository reviewer or contributor with accepted NSOC PRs.`;

            const comment = [
              MARKER,
              `## 👋 Thanks for opening a PR, @${author}!`,
              '',
              `Your PR has entered the **🚦 PR Review Pipeline**.`,
              '',
              programNote,
              '',
              '---',
              '',
              '### What happens next',
              '',
              '| Stage | Reviewer | Checks |',
              '|-------|----------|--------|',
              '| **Stage 1** — Automated Validation | 🤖 Bot | DCO · Format · AI/Slop · Duplicate |',
              `| **Stage 2** — Human Review | ${isGssoc ? '🧑‍🏫 GSSOC Mentor' : '👥 Reviewer / NSOC Contributor'} | Code + Quality Review |`,
              '| **Stage 3** — PA Review | 🔑 Project Admin | Final Merge Decision |',
              '',
              'A **pipeline status comment** will appear below and update automatically.',
              '',
              '---',
              '',
              '### While you wait',
              '',
              '- Sign all commits (`git commit -s`)',
              '- Link issue with `Closes #123`',
              '- Use a feature branch (not `main`)',
              '- Avoid unrelated changes',
              '',
              '*This comment is posted only once.*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: number, body: comment
            });

            console.log(`Welcome comment posted for PR #${number}`);

            // Apply routing label
            if (isGssoc) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: number, labels: ['gssoc-review']
                });
                console.log('Added gssoc-review label');
              } catch (e) {
                console.log('Label already exists or error');
              }
            }
