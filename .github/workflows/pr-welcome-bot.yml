name: 👋 PR Welcome

# Fires ONCE when a PR is opened.
# Posts a single welcome comment (idempotent via HTML marker).
# Also applies the gssoc-review routing label if the PR is detected as GSSOC.
#
# Safe with existing workflows:
#   - leaderboard.yml   → also fires on opened, but posts a different comment (leaderboard marker)
#   - pr-validator.yml  → also fires on opened, posts format check comment
#   - dco-helper.yml    → also fires on opened, posts DCO comment
#   All are separate comments; no collision.
#
# detect-ping-spam.yml ignores Bot senders → our comments won't trigger it.
# spam-escalation.yml  only reacts to label 'spam' → our labels are safe.

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: pr-welcome-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Post welcome comment + apply routing label
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr     = context.payload.pull_request;
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const number = pr.number;
            const author = pr.user.login;

            // ─────────────────────────────────────────────
            // GSSOC detection
            // pr-validator.yml will also apply gssoc26 label
            // from PR body — we do early detection here from
            // branch name and body so routing is immediate.
            // ─────────────────────────────────────────────
            const branch = (pr.head.ref || '').toLowerCase();
            const body   = (pr.body   || '').toLowerCase();
            const labels = (pr.labels || []).map(l => l.name);

            const isGssoc =
              labels.includes('gssoc26') ||
              branch.includes('gssoc')  ||
              body.includes('gssoc');

            // ─────────────────────────────────────────────
            // Idempotency — skip if already posted
            // ─────────────────────────────────────────────
            const { data: existing } =
              await github.rest.issues.listComments({
                owner, repo, issue_number: number, per_page: 100
              });

            const MARKER = '<!-- pr-welcome-v1 -->';

            if (existing.some(c => c.body.includes(MARKER))) {
              core.info('Welcome comment already posted — skipping.');
              return;
            }

            // ─────────────────────────────────────────────
            // Build comment
            // ─────────────────────────────────────────────
            const programNote = isGssoc
              ? `> 🟢 **GSSOC PR detected** — your PR will be routed to an approved GSSOC mentor for Stage 2 review.`
              : `> ⚪ **NSOC PR detected** — your PR will be reviewed by a repository reviewer or contributor with accepted NSOC PRs.`;

            const comment = [
              MARKER,
              `## 👋 Thanks for opening a PR, @${author}!`,
              '',
              `Your PR has entered the **🚦 PR Review Pipeline**.`,
              '',
              programNote,
              '',
              '---',
              '',
              '### What happens next',
              '',
              '| Stage | Reviewer | Checks |',
              '|-------|----------|--------|',
              '| **Stage 1** — Automated Validation | 🤖 Bot | DCO · PR format · AI/slop detection · Duplicate guard · Code quality |',
              `| **Stage 2** — Human Review | ${isGssoc ? '🧑‍🏫 Approved GSSOC mentor' : '👥 Reviewer / NSOC contributor'} | Code review + approval |`,
              '| **Stage 3** — PA Review | 🔑 Project Admin | Architecture · legitimacy · merge safety |',
              '',
              'A **pipeline status comment** will appear below and update automatically as your PR progresses.',
              '',
              '---',
              '',
              '### While you wait',
              '',
              '- Make sure every commit is signed off (`git commit -s`) — DCO is required',
              '- Your PR description must include `Closes #N` linking your assigned issue',
              '- Self-review your diff for accidental debug code or unrelated changes',
              '- PRs opened from `main` or `master` branches are blocked — please use a feature branch',
              '',
              `*This comment is posted once. Progress updates appear in the pipeline status comment.*`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: number, body: comment
            });

            // ─────────────────────────────────────────────
            // Apply gssoc-review routing label
            // (pr-validator.yml will apply gssoc26 from body;
            //  this applies our pipeline routing label early)
            // ─────────────────────────────────────────────
            if (isGssoc) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: number,
                  labels: ['gssoc-review']
                });
              } catch (_) {}
            }
