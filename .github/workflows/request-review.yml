name: 👥 Request Reviewers (Stage 2)

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: request-reviewers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-reviewers:
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved')

    steps:
      - name: Stage 2 - Request Reviewers
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const labels = (pr.labels || []).map(l => l.name.toLowerCase());
            const isGssoc = labels.includes('gssoc26');
            const isNsoc = labels.includes('nsoc26');

            if (!isGssoc && !isNsoc) {
              core.info('PR is not GSSOC or NSOC. Skipping reviewer assignment.');
              return;
            }

            const { data: requested } = await github.rest.pulls.listRequestedReviewers({
              owner, repo, pull_number: prNumber
            });
            const alreadyRequested = (requested.users || []).map(u => u.login.toLowerCase());

            if (alreadyRequested.length >= 2) {
              core.info('Enough reviewers already requested. Skipping.');
              return;
            }

            let reviewerPool = [];

            if (isGssoc) {
              try {
                const { data: file } = await github.rest.repos.getContent({
                  owner, repo, path: '.github/reviewers/gssoc-mentors.json', ref: 'main'
                });
                const content = Buffer.from(file.content, 'base64').toString('utf8');
                reviewerPool = JSON.parse(content).reviewers || [];
              } catch (e) {
                core.warning(`Failed to load GSSOC mentors: ${e?.message || e}`);
                return;
              }
            } else {
              core.info('Fetching NSOC experienced contributors (ranked by merged PRs)...');
              try {
                const prs = await github.paginate(github.rest.pulls.list, {
                  owner, repo, state: 'closed', per_page: 100
                });

                const mergeCount = new Map();
                for (const p of prs) {
                  if (!p.merged_at) continue;
                  const prLabels = (p.labels || []).map(l => l.name.toLowerCase());
                  if (prLabels.includes('nsoc26') && p.user && p.user.login) {
                    mergeCount.set(p.user.login, (mergeCount.get(p.user.login) || 0) + 1);
                  }
                }

                reviewerPool = Array.from(mergeCount.entries())
                  .sort((a, b) => b[1] - a[1])
                  .map(([login]) => login);

                core.info(`Found ${reviewerPool.length} NSOC contributors ranked by merged PRs`);
              } catch (e) {
                core.warning(`Failed to fetch NSOC contributors: ${e?.message || e}`);
                return;
              }
            }

            if (reviewerPool.length === 0) {
              core.info('No reviewers available. Skipping.');
              return;
            }

            reviewerPool = reviewerPool.filter(reviewer =>
              reviewer.toLowerCase() !== pr.user.login.toLowerCase() &&
              !alreadyRequested.includes(reviewer.toLowerCase())
            );

            if (reviewerPool.length === 0) {
              core.info('No eligible reviewers after filtering. Skipping.');
              return;
            }

            let selected;
            if (isGssoc) {
              const seed = prNumber;
              const poolSize = reviewerPool.length;
              const idx1 = seed % poolSize;
              let idx2 = (seed * 7 + 3) % poolSize;
              if (idx2 === idx1) idx2 = (idx1 + 1) % poolSize;
              selected = [reviewerPool[idx1]];
              if (poolSize > 1) selected.push(reviewerPool[idx2]);
            } else {
              selected = reviewerPool.slice(0, 2);
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number: prNumber, reviewers: selected
              });
              core.info(`Requested reviewers: ${selected.join(', ')}`);
            } catch (err) {
              core.warning(`Failed to request reviewers: ${err?.message || err}`);
            }

            const reviewLabel = isGssoc ? 'mentor-review-requested' : 'nsoc-review-requested';
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNumber, labels: [reviewLabel]
              });
            } catch (e) {
              core.warning(`Failed to add ${reviewLabel} label: ${e?.message || e}`);
            }
