name: 👥 Request Reviewers

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: request-reviewers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-reviewers:
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved')

    steps:
      - name: Request Reviewers
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const labels = (pr.labels || []).map(l => l.name.toLowerCase());
            const isGssoc = labels.includes('gssoc26');

            // Prevent duplicate requests
            const { data: requested } = await github.rest.pulls.listRequestedReviewers({
              owner, repo, pull_number: prNumber
            });

            const alreadyRequested = (requested.users || []).map(u => u.login.toLowerCase());

            if (alreadyRequested.length >= 2) {
              console.log('Sufficient reviewers already requested. Skipping.');
              return;
            }

            // Choose reviewer pool file
            const reviewerFile = isGssoc 
              ? '.github/reviewers/gssoc-mentors.json' 
              : '.github/reviewers/nsoc-reviewers.json';

            let reviewerPool = [];

            try {
              // Note: We don't need checkout because github-script runs in the repo context
              const { data: fileContent } = await github.rest.repos.getContent({
                owner,
                repo,
                path: reviewerFile,
                ref: 'main'
              });

              const decoded = Buffer.from(fileContent.content, 'base64').toString('utf8');
              const parsed = JSON.parse(decoded);
              reviewerPool = parsed.reviewers || [];
            } catch (err) {
              console.error(`Failed to load ${reviewerFile}:`, err.message);
              console.log('Falling back to empty reviewer pool.');
              reviewerPool = [];
            }

            if (reviewerPool.length === 0) {
              console.log('No reviewers available in pool. Skipping auto-request.');
              return;
            }

            // Remove PR author and already requested reviewers
            reviewerPool = reviewerPool.filter(reviewer => 
              reviewer.toLowerCase() !== pr.user.login.toLowerCase() &&
              !alreadyRequested.includes(reviewer.toLowerCase())
            );

            if (reviewerPool.length < 2) {
              console.log(`Only ${reviewerPool.length} eligible reviewer(s) left. Skipping.`);
              return;
            }

            // Fisher-Yates shuffle + pick 2
            for (let i = reviewerPool.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [reviewerPool[i], reviewerPool[j]] = [reviewerPool[j], reviewerPool[i]];
            }

            const selected = reviewerPool.slice(0, 2);

            // Request reviewers
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: prNumber,
                reviewers: selected
              });
              console.log(`Successfully requested reviewers: ${selected.join(', ')}`);
            } catch (err) {
              console.error('Failed to request reviewers:', err.message);
            }

            // Add tracking label
            const reviewLabel = isGssoc ? 'mentor-review-requested' : 'nsoc-review-requested';
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: [reviewLabel]
              });
            } catch (err) {
              console.log('Label already exists or error:', err.message);
            }
