name: 🔄 Update NSoC Leaderboard

on:
  pull_request_target:
    types:
      - opened
      - closed
      - reopened

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: update-nsoc-leaderboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # SAFE:
      # Never checkout attacker PR code
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update leaderboard data
        env:
          USERNAME: ${{ github.event.pull_request.user.login }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          node .github/scripts/update-leaderboard.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: |
            chore: update NSoC leaderboard [skip actions]

          title: |
            chore: update NSoC leaderboard

          body: |
            ## Automated Leaderboard Update

            This PR updates:

            - contributor scores
            - merged PR counts
            - open PR counts
            - contributor rankings

            Generated automatically by GitHub Actions.

          branch: refresh-nsoc-leaderboard
          delete-branch: true

          add-paths: |
            data/nsoc-leaderboard.json